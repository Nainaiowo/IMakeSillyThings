name: Update download counts

on:
  workflow_dispatch:
  schedule:
    - cron: "7,27,47 * * * *"

permissions:
  contents: write

jobs:
  update-download-counts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update repo metadata
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/update-download-counts.ps1

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet -- repo.json; then
            echo "No download count changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git commit -m "Update download counts"
          git push
